<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社群圖產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans TC', -apple-system, sans-serif;
  background: #F2F0ED;
  color: #2A2A2A;
  min-height: 100vh;
}
.toolbar {
  background: #1A1A1A;
  color: #fff;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
}
.toolbar h1 { font-size: 18px; font-weight: 700; flex: 1; }
.toolbar button, .toolbar label {
  background: #C45A28;
  color: #fff;
  border: none;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}
.toolbar button:hover, .toolbar label:hover { background: #E8764A; }
.toolbar select {
  background: #333;
  color: #fff;
  border: 1px solid #555;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.toolbar input[type="file"] { display: none; }
.app { display: flex; height: calc(100vh - 56px); }
.editor {
  width: 420px;
  min-width: 420px;
  background: #1E1E1E;
  display: flex;
  flex-direction: column;
  border-right: 1px solid #333;
}
.editor-tabs {
  display: flex;
  align-items: center;
  border-bottom: 1px solid #333;
  padding: 0 4px;
}
.tab-btn {
  background: none;
  border: none;
  color: #777;
  font-size: 13px;
  font-family: inherit;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.tab-btn:hover { color: #ccc; }
.tab-btn.active { color: #fff; border-bottom-color: #C45A28; }
.guide-panel {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  color: #ccc;
  font-size: 13px;
  line-height: 1.8;
}
.editor textarea {
  flex: 1;
  background: #1E1E1E;
  color: #D4D4D4;
  border: none;
  padding: 16px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.7;
  resize: none;
  outline: none;
}
.preview {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 24px;
  justify-content: center;
}
.slide-wrapper {
  width: 340px;
  height: 425px;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  position: relative;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.slide-wrapper:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.slide-wrapper .slide-number {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.5);
  color: #fff;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  z-index: 10;
}
.slide-wrapper .download-btn {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: #C45A28;
  color: #fff;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 10;
  font-size: 16px;
}
.slide-wrapper:hover .download-btn { opacity: 1; }

/* Slides — dimensions set via JS */
.slide {
  font-family: 'Noto Sans TC', sans-serif;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  transform-origin: top left;
}

/* === COVER (always dark) === */
.slide.cover {
  color: #fff;
  padding: 80px 72px;
}
.slide.cover .tag {
  display: inline-block;
  color: #fff;
  padding: 8px 20px;
  border-radius: 4px;
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 48px;
}
.slide.cover .cover-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.slide.cover h1 {
  font-size: 80px;
  font-weight: 900;
  line-height: 1.25;
  margin-bottom: 32px;
  letter-spacing: 1px;
}
.slide.cover h2 {
  font-size: 32px;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 16px;
  opacity: 0.85;
}
.slide.cover .subtitle {
  font-size: 26px;
  font-weight: 400;
  line-height: 1.6;
  opacity: 0.7;
  letter-spacing: 2px;
}
.slide.cover .cover-footer {
  border-top: 3px solid rgba(255,255,255,0.3);
  padding-top: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 22px;
  opacity: 0.7;
}

/* === CONTENT SLIDE === */
.slide.content-slide {
  padding: 64px 72px 64px 66px;
  border-left: 6px solid;
}
.slide.content-slide .slide-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
}
.slide.content-slide .tag {
  display: inline-block;
  color: #fff;
  padding: 8px 20px;
  border-radius: 4px;
  font-size: 22px;
  font-weight: 700;
}
.slide.content-slide .page-num {
  font-size: 24px;
  font-weight: 400;
  letter-spacing: 1px;
}
.slide.content-slide .slide-body {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.slide.content-slide h1 {
  font-size: 64px;
  font-weight: 900;
  line-height: 1.3;
  margin-bottom: 40px;
}
.slide.content-slide h2 {
  font-size: 40px;
  font-weight: 900;
  line-height: 1.4;
  margin-bottom: 28px;
}
.slide.content-slide h3 {
  font-size: 34px;
  font-weight: 700;
  line-height: 1.4;
  margin-bottom: 24px;
}
.slide.content-slide p {
  font-size: 30px;
  line-height: 1.8;
  margin-bottom: 32px;
}

/* --- List items with colored dot --- */
.slide.content-slide .list-group { margin-bottom: 32px; }
.slide.content-slide .list-item {
  font-size: 30px;
  line-height: 1.7;
  padding-left: 40px;
  position: relative;
  margin-bottom: 16px;
}
/* dot rendered inline via JS */

/* --- Numbered items: card style --- */
.slide.content-slide .numbered-card {
  margin-bottom: 28px;
  padding: 28px 32px;
  border-radius: 16px;
}
.slide.content-slide .numbered-card .num-badge {
  font-size: 44px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 8px;
}
.slide.content-slide .numbered-card .num-title {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.5;
  margin-bottom: 8px;
}
.slide.content-slide .numbered-card .num-desc {
  font-size: 26px;
  line-height: 1.7;
  opacity: 0.85;
}

/* --- Callout with icon --- */
.slide.content-slide .callout {
  border-left: 6px solid;
  padding: 24px 28px 24px 28px;
  margin-bottom: 32px;
  font-size: 28px;
  line-height: 1.7;
  border-radius: 0 12px 12px 0;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.slide.content-slide .callout-icon {
  font-size: 32px;
  flex-shrink: 0;
  line-height: 1.7;
}

/* --- Quote box with decorative quotes --- */
.slide.content-slide .quote-box {
  margin-top: auto;
  border-radius: 16px;
  padding: 40px 48px;
  text-align: center;
  margin-bottom: 24px;
  position: relative;
}
.slide.content-slide .quote-box .quote-mark {
  font-size: 72px;
  line-height: 1;
  opacity: 0.3;
  font-weight: 900;
  margin-bottom: -8px;
}
.slide.content-slide .quote-box p {
  font-size: 32px;
  line-height: 1.7;
  font-weight: 700;
  margin-bottom: 0;
}

/* --- Big number --- */
.slide.content-slide .big-number {
  font-size: 160px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 16px;
  letter-spacing: -4px;
}

/* --- Horizontal divider --- */
.slide.content-slide .slide-divider {
  height: 2px;
  border: none;
  margin: 16px 0 32px 0;
  opacity: 0.2;
  border-radius: 1px;
}

.slide.content-slide .slide-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 22px;
  padding-top: 16px;
}
.slide.content-slide .slide-footer .handle {
  font-weight: 700;
}

/* === COMPACT MODE (auto-applied when content is dense) === */
.slide.content-slide.compact { padding-top: 48px; padding-bottom: 48px; }
.slide.content-slide.compact h1 { font-size: 48px; margin-bottom: 24px; }
.slide.content-slide.compact .numbered-card { padding: 16px 24px; margin-bottom: 12px; }
.slide.content-slide.compact .numbered-card .num-badge { font-size: 32px; margin-bottom: 4px; }
.slide.content-slide.compact .numbered-card .num-title { font-size: 26px; margin-bottom: 4px; }
.slide.content-slide.compact .numbered-card .num-desc { font-size: 22px; line-height: 1.5; }
.slide.content-slide.compact p { font-size: 24px; margin-bottom: 16px; }
.slide.content-slide.compact .list-item { font-size: 24px; margin-bottom: 8px; }
.slide.content-slide.compact .slide-head { margin-bottom: 24px; }

/* === STATEMENT SLIDE (title-only, centered) === */
.slide.content-slide.statement-slide {
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 80px 72px;
}
.slide.content-slide.statement-slide .slide-head {
  position: absolute;
  top: 64px;
  left: 66px;
  right: 72px;
}
.slide.content-slide.statement-slide .slide-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.slide.content-slide.statement-slide h1 {
  font-size: 76px;
  line-height: 1.35;
  margin-bottom: 0;
}
.slide.content-slide.statement-slide .quote-box {
  margin-top: 48px;
}
.slide.content-slide.statement-slide .slide-footer {
  position: absolute;
  bottom: 48px;
  left: 66px;
  right: 72px;
}

/* === HERO IMAGE SLIDE === */
.slide.content-slide.has-hero {
  padding: 0;
  border-left: none;
}
.slide.content-slide.has-hero .hero-image {
  width: 100%;
  object-fit: cover;
  display: block;
}
.slide.content-slide.has-hero .hero-body {
  display: flex;
  flex-direction: column;
  padding: 36px 72px 64px 66px;
  border-left: 6px solid;
}
.slide.content-slide.has-hero .hero-body h1 { font-size: 52px; margin-bottom: 24px; }
.slide.content-slide.has-hero .hero-body h2 { font-size: 34px; margin-bottom: 20px; }
.slide.content-slide.has-hero .hero-body p { font-size: 26px; margin-bottom: 20px; }
.slide.content-slide.has-hero .hero-body .list-item { font-size: 26px; }
.slide.content-slide.has-hero .hero-body .numbered-card { padding: 20px 24px; margin-bottom: 20px; }
.slide.content-slide.has-hero .hero-body .callout { font-size: 24px; }
.slide.content-slide.has-hero .hero-body .quote-box p { font-size: 26px; }
.slide.content-slide.has-hero .hero-body .slide-footer { font-size: 20px; padding-top: 12px; }
.slide.content-slide.has-hero.statement-slide .hero-body {
  border-left: none;
  padding: 36px 72px 64px 72px;
}
.slide.content-slide.has-hero.statement-slide .hero-body .slide-head {
  position: relative;
  top: auto;
  left: auto;
  right: auto;
}
.slide.content-slide.has-hero.statement-slide .hero-body .slide-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.slide.content-slide.has-hero.statement-slide .hero-body .slide-footer {
  position: relative;
  bottom: auto;
  left: auto;
  right: auto;
}
.slide.content-slide.has-hero.statement-slide .hero-body h1 {
  font-size: 60px;
  margin-bottom: 0;
}

/* === CTA SLIDE === */
.slide.cta-slide {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 72px;
}
.slide.cta-slide .cta-icon {
  font-size: 120px;
  margin-bottom: 48px;
  opacity: 0.9;
}
.slide.cta-slide h1 {
  font-size: 72px;
  font-weight: 900;
  line-height: 1.3;
  margin-bottom: 32px;
}
.slide.cta-slide p {
  font-size: 34px;
  line-height: 1.7;
  margin-bottom: 20px;
  opacity: 0.8;
}
.slide.cta-slide .cta-handle {
  font-size: 48px;
  font-weight: 900;
  margin-top: 40px;
  letter-spacing: 1px;
}
.slide.cta-slide .cta-divider {
  width: 80px;
  height: 4px;
  border-radius: 2px;
  margin: 32px auto;
}
.slide.cta-slide .cta-actions {
  margin-top: 48px;
  display: flex;
  gap: 24px;
}
.slide.cta-slide .cta-pill {
  padding: 16px 40px;
  border-radius: 40px;
  font-size: 28px;
  font-weight: 700;
  border: 3px solid;
}

/* === BRAND SETTINGS PANEL === */
.brand-panel {
  position: fixed;
  top: 56px;
  right: 0;
  width: 320px;
  background: #1E1E1E;
  border-left: 1px solid #333;
  padding: 24px;
  z-index: 200;
  display: none;
  max-height: calc(100vh - 56px);
  overflow-y: auto;
  box-shadow: -4px 0 24px rgba(0,0,0,0.3);
}
.brand-panel.active { display: block; }
.brand-panel h3 {
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
}
.brand-panel label {
  display: block;
  color: #999;
  font-size: 12px;
  margin-bottom: 4px;
  margin-top: 12px;
  background: none;
  padding: 0;
  border-radius: 0;
  cursor: default;
}
.brand-panel input[type="text"] {
  width: 100%;
  background: #2A2A2A;
  border: 1px solid #444;
  color: #fff;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
}
.brand-panel .save-btn {
  margin-top: 20px;
  width: 100%;
  background: #C45A28;
  color: #fff;
  border: none;
  padding: 10px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.brand-panel .save-btn:hover { background: #E8764A; }
.brand-panel .clear-btn {
  margin-top: 8px;
  width: 100%;
  background: none;
  color: #777;
  border: 1px solid #444;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: #999;
  text-align: center;
  gap: 12px;
}
.empty-state .icon { font-size: 48px; opacity: 0.3; }
.empty-state p { font-size: 14px; }
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.loading-overlay.active { display: flex; }
.loading-spinner {
  background: #fff;
  padding: 24px 40px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 500;
}
@media (max-width: 900px) {
  .app { flex-direction: column; height: auto; }
  .editor { width: 100%; min-width: 0; height: 50vh; }
  .preview { padding: 16px; }
  .slide-wrapper { width: 280px; height: 350px; }
}
</style>
</head>
<body>

<div class="toolbar">
  <h1>社群圖產生器</h1>
  <select id="themeSelect" onchange="applyThemeMode()">
    <option value="暖橘">暖橘</option>
    <option value="vibe-reader">Vibe Reader</option>
    <option value="莓果紫">莓果紫</option>
    <option value="森林綠">森林綠</option>
    <option value="玫瑰金">玫瑰金</option>
    <option value="日落粉">日落粉</option>
    <option value="海洋藍">海洋藍</option>
    <option value="午夜">午夜</option>
  </select>
  <select id="modeSelect" onchange="applyThemeMode()">
    <option value="light">Light</option>
    <option value="dark">Dark</option>
  </select>
  <select id="coverSelect" onchange="applyThemeMode()">
    <option value="gradient">封面：漸層</option>
    <option value="solid">封面：純色</option>
  </select>
  <select id="ratioSelect" onchange="applyThemeMode()">
    <option value="4:5">4:5 IG 直式</option>
    <option value="1:1">1:1 正方形</option>
    <option value="9:16">9:16 Story</option>
    <option value="16:9">16:9 橫式</option>
  </select>
  <label>上傳 .md<input type="file" id="fileInput" accept=".md,.txt,.markdown"></label>
  <button onclick="generate()">產生圖片</button>
  <button onclick="downloadAll()">全部下載</button>
  <button onclick="toggleBrandPanel()" style="background:#555">品牌設定</button>
</div>

<div class="brand-panel" id="brandPanel">
  <h3>品牌預設值</h3>
  <p style="color:#777;font-size:12px;margin-bottom:12px">Markdown 未設定時自動帶入</p>
  <label>Handle（帳號）</label>
  <input type="text" id="brandHandle" placeholder="@yourstudio">
  <label>Source（來源）</label>
  <input type="text" id="brandSource" placeholder="你的品牌名稱">
  <label>Tag（預設標籤）</label>
  <input type="text" id="brandTag" placeholder="好文分享">
  <label>預設主題色</label>
  <input type="text" id="brandTheme" placeholder="暖橘">
  <label>預設模式</label>
  <input type="text" id="brandMode" placeholder="light">
  <button class="save-btn" onclick="saveBrand()">儲存設定</button>
  <button class="clear-btn" onclick="clearBrand()">清除設定</button>
</div>

<div class="app">
  <div class="editor">
    <div class="editor-tabs">
      <button class="tab-btn active" onclick="switchTab('editor')">Markdown</button>
      <button class="tab-btn" onclick="switchTab('guide')">格式說明</button>
      <span style="flex:1"></span>
      <span style="font-size:11px; color:#666; padding-right:12px">即時預覽 ON</span>
    </div>
    <textarea id="mdInput" placeholder="在這裡貼上 Markdown..."></textarea>
    <div id="guidePanel" class="guide-panel" style="display:none"></div>
  </div>
  <div class="preview" id="preview">
    <div class="empty-state">
      <div class="icon">&#9998;</div>
      <p>在左側貼上 Markdown，按「產生圖片」</p>
    </div>
  </div>
</div>

<div id="renderContainer" style="position:absolute;left:-9999px;top:0;"></div>
<div class="loading-overlay" id="loading">
  <div class="loading-spinner">下載中...</div>
</div>

<script>
// === THEMES ===
var THEMES = {
  '暖橘': {
    accent: '#C45A28',
    accentLight: '#E8764A',
    coverGradient: 'linear-gradient(175deg, #0D0D0D 0%, #1A1008 25%, #3A1A0C 50%, #8B3A18 75%, #C45A28 100%)',
    coverSolid: '#C45A28',
    coverSolidText: '#FFFFFF',
    light: {
      bg: '#FFFFFF',
      text: '#2A2A2A',
      subtext: '#444444',
      muted: '#999999',
      heading: '#1A1A1A',
      calloutBg: '#F5F0EB',
      quoteBg: '#F5F0EB',
      listDot: '#1A1A1A'
    },
    dark: {
      bg: '#1A1A1A',
      text: '#E0E0E0',
      subtext: '#BBBBBB',
      muted: '#777777',
      heading: '#FFFFFF',
      calloutBg: '#2A2520',
      quoteBg: '#2A2520',
      listDot: '#FFFFFF'
    }
  },
  'vibe-reader': {
    accent: '#1D274A',
    accentLight: '#48E6B9',
    coverGradient: 'linear-gradient(175deg, #0D0D0D 0%, #1A1008 25%, #122C57 50%, #1D4381 75%, #2757A5 100%)',
    coverSolid: '#1D274A',
    coverSolidText: '#FFFFFF',
    light: {
      bg: '#FFFFFF',
      text: '#2A2A2A',
      subtext: '#444444',
      muted: '#999999',
      heading: '#1A1A1A',
      calloutBg: '#EDF1F8',
      quoteBg: '#EDF1F8',
      listDot: '#1A1A1A'
    },
    dark: {
      bg: '#0F1624',
      text: '#D0D8E8',
      subtext: '#9AABBF',
      muted: '#5A6A80',
      heading: '#FFFFFF',
      calloutBg: '#1A2540',
      quoteBg: '#1A2540',
      listDot: '#FFFFFF'
    }
  },
  '莓果紫': {

// === BRAND SETTINGS ===
function loadBrand() {
  try {
    return JSON.parse(localStorage.getItem('socialCardsBrand') || '{}');
  } catch(e) { return {}; }
}

function saveBrand() {
  var brand = {
    handle: document.getElementById('brandHandle').value.trim(),
    source: document.getElementById('brandSource').value.trim(),
    tag: document.getElementById('brandTag').value.trim(),
    theme: document.getElementById('brandTheme').value.trim(),
    mode: document.getElementById('brandMode').value.trim()
  };
  localStorage.setItem('socialCardsBrand', JSON.stringify(brand));
  document.getElementById('brandPanel').classList.remove('active');
  generate();
}

function clearBrand() {
  localStorage.removeItem('socialCardsBrand');
  document.getElementById('brandHandle').value = '';
  document.getElementById('brandSource').value = '';
  document.getElementById('brandTag').value = '';
  document.getElementById('brandTheme').value = '';
  document.getElementById('brandMode').value = '';
}

function toggleBrandPanel() {
  var panel = document.getElementById('brandPanel');
  panel.classList.toggle('active');
  if (panel.classList.contains('active')) {
    var brand = loadBrand();
    document.getElementById('brandHandle').value = brand.handle || '';
    document.getElementById('brandSource').value = brand.source || '';
    document.getElementById('brandTag').value = brand.tag || '';
    document.getElementById('brandTheme').value = brand.theme || '';
    document.getElementById('brandMode').value = brand.mode || '';
  }
}

// === PARSER ===
function parseMd(md) {
  var fmRegex = /^---\n([\s\S]*?)\n---/;
  var fmMatch = md.match(fmRegex);
  var brand = loadBrand();
  var config = {
    tag: brand.tag || '',
    source: brand.source || '',
    handle: brand.handle || '',
    theme: brand.theme || '暖橘',
    mode: brand.mode || 'light',
    cover: 'gradient',
    ratio: '4:5',
    cta: 'auto'
  };

  if (fmMatch) {
    fmMatch[1].split('\n').forEach(function(line) {
      var idx = line.indexOf(':');
      if (idx > -1) {
        var key = line.slice(0, idx).trim();
        var val = line.slice(idx + 1).trim();
        config[key] = val;
      }
    });
    md = md.slice(fmMatch[0].length).trim();
  }

  var blocks = md.split(/\n---\n/).filter(function(b) { return b.trim(); });

  var hasCta = false;
  var slides = [];

  blocks.forEach(function(block, i) {
    var trimmed = block.trim();
    if (trimmed.toLowerCase() === 'cta' || trimmed.indexOf('cta\n') === 0 || trimmed.indexOf('[cta]') === 0) {
      var parsed = parseBlock(trimmed.replace(/^cta\n?/i, '').replace(/^\[cta\]\n?/i, '').trim());
      parsed.type = 'cta';
      parsed.pageNum = i;
      slides.push(parsed);
      hasCta = true;
    } else {
      var parsed = parseBlock(trimmed);
      parsed.type = i === 0 ? 'cover' : 'content';
      parsed.pageNum = i;
      slides.push(parsed);
    }
  });

  // Auto-generate CTA if config.cta !== 'none' and no explicit CTA
  if (!hasCta && config.cta !== 'none') {
    slides.push({
      type: 'cta',
      tag: null,
      elements: [],
      pageNum: slides.length
    });
  }

  return { config: config, slides: slides, totalPages: slides.length };
}

function parseBlock(text) {
  var lines = text.split('\n');
  var elements = [];
  var tag = null;
  var i = 0;

  while (i < lines.length) {
    var line = lines[i];

    // Horizontal divider: ***
    if (/^\*{3,}$/.test(line.trim())) {
      elements.push({ type: 'divider' });
      i++;
      continue;
    }

    // Image: ![alt](url)
    var imgMatch = line.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
    if (imgMatch) {
      elements.push({ type: 'image', alt: imgMatch[1], url: imgMatch[2] });
      i++;
      continue;
    }

    var tagMatch = line.match(/^\[(.+)\]$/);
    if (tagMatch) {
      tag = tagMatch[1];
      i++;
      continue;
    }

    // Big number: {87%} or {3x} or {21天}
    var bigNumMatch = line.match(/^\{(.+)\}$/);
    if (bigNumMatch) {
      elements.push({ type: 'bignumber', text: bigNumMatch[1] });
      i++;
      continue;
    }

    if (line.indexOf('# ') === 0 && line.indexOf('## ') !== 0 && line.indexOf('### ') !== 0) {
      var h = line.slice(2);
      while (i + 1 < lines.length && lines[i + 1].indexOf('# ') === 0 && lines[i + 1].indexOf('## ') !== 0) {
        i++;
        h += '<br>' + lines[i].slice(2);
      }
      elements.push({ type: 'h1', text: h });
      i++;
      continue;
    }

    if (line.indexOf('## ') === 0 && line.indexOf('### ') !== 0) {
      elements.push({ type: 'h2', text: line.slice(3) });
      i++;
      continue;
    }

    if (line.indexOf('### ') === 0) {
      elements.push({ type: 'h3', text: line.slice(4) });
      i++;
      continue;
    }

    if (line.indexOf('> ') === 0) {
      var qLines = [];
      while (i < lines.length && lines[i].indexOf('> ') === 0) {
        qLines.push(lines[i].slice(2));
        i++;
      }
      elements.push({ type: 'quote', text: qLines.join('<br>') });
      continue;
    }

    if (line.indexOf('|> ') === 0) {
      elements.push({ type: 'callout', text: line.slice(3) });
      i++;
      continue;
    }

    if (line.indexOf('- ') === 0) {
      var items = [];
      while (i < lines.length && lines[i].indexOf('- ') === 0) {
        items.push(lines[i].slice(2));
        i++;
      }
      elements.push({ type: 'list', items: items });
      continue;
    }

    if (!line.trim()) {
      i++;
      continue;
    }

    elements.push({ type: 'p', text: line });
    i++;
  }

  return { tag: tag, elements: elements };
}

function renderHighlight(text, color) {
  return text.replace(/\*\*(.+?)\*\*/g, '<span style="color:' + color + '">$1</span>');
}

// === RENDERER ===
function getTheme(name) {
  return THEMES[name] || THEMES['暖橘'];
}

function renderSlides(parsed) {
  var config = parsed.config;
  var slides = parsed.slides;
  var theme = getTheme(config.theme);
  var mode = config.mode === 'dark' ? 'dark' : 'light';
  var colors = theme[mode];
  var textAccent = mode === 'dark' ? theme.accentLight : theme.accent;
  var container = document.getElementById('renderContainer');
  var preview = document.getElementById('preview');
  container.innerHTML = '';
  preview.innerHTML = '';

  var dim = getDimensions();
  var totalPages = slides.length;
  var contentPageNum = 0;
  var previewW = 340;
  var previewH = Math.round(previewW * (dim.h / dim.w));

  slides.forEach(function(slide, idx) {
    var el = document.createElement('div');
    el.className = 'slide';
    el.style.width = dim.w + 'px';
    el.style.height = dim.h + 'px';

    if (slide.type === 'cover') {
      el.classList.add('cover');
      if (config.cover === 'solid') {
        el.style.background = theme.coverSolid;
        el.style.color = theme.coverSolidText;
      } else {
        el.style.background = theme.coverGradient;
        el.style.color = '#FFFFFF';
      }
      el.innerHTML = renderCover(slide, config, theme, totalPages);
    } else if (slide.type === 'cta') {
      el.classList.add('cta-slide');
      if (config.cover === 'solid') {
        el.style.background = theme.coverSolid;
        el.style.color = theme.coverSolidText;
      } else {
        el.style.background = theme.coverGradient;
        el.style.color = '#FFFFFF';
      }
      el.innerHTML = renderCta(slide, config, theme);
    } else {
      contentPageNum++;
      var hasHero = slide.elements.length > 0 && slide.elements[0].type === 'image';
      // Statement slide: only h1, or h1 + quote, nothing else
      var nonEmpty = slide.elements.filter(function(e) { return e.type !== 'image'; });
      var isStatement = nonEmpty.length >= 1 && nonEmpty[0].type === 'h1' &&
        (nonEmpty.length === 1 || (nonEmpty.length === 2 && nonEmpty[1].type === 'quote'));
      el.classList.add('content-slide');
      if (hasHero) el.classList.add('has-hero');
      if (isStatement) el.classList.add('statement-slide');
      el.style.background = colors.bg;
      el.style.color = colors.text;
      if (!hasHero) el.style.borderLeftColor = theme.accent;
      el.innerHTML = renderContent(slide, config, contentPageNum, totalPages, theme, colors, textAccent);
    }

    container.appendChild(el);

    // Auto-compact: count heavy elements and shrink if too many
    if (slide.type === 'content') {
      var numCount = slide.elements.filter(function(e) {
        return e.type === 'p' && /^[①②③④⑤⑥⑦⑧⑨⑩]/.test(e.text);
      }).length;
      var listCount = slide.elements.filter(function(e) { return e.type === 'list'; }).length;
      var totalItems = numCount;
      slide.elements.forEach(function(e) {
        if (e.type === 'list') totalItems += e.items.length;
      });

      if (numCount >= 4 || totalItems >= 7) {
        el.classList.add('compact');
      }
    }

    var wrapper = document.createElement('div');
    wrapper.className = 'slide-wrapper';
    wrapper.style.width = previewW + 'px';
    wrapper.style.height = previewH + 'px';

    var numDiv = document.createElement('div');
    numDiv.className = 'slide-number';
    numDiv.textContent = (idx + 1) + '/' + totalPages;
    numDiv.style.fontSize = '11px';
    numDiv.style.width = 'auto';
    numDiv.style.padding = '4px 10px';
    numDiv.style.borderRadius = '12px';
    wrapper.appendChild(numDiv);

    var dlBtn = document.createElement('button');
    dlBtn.className = 'download-btn';
    dlBtn.innerHTML = '&#8595;';
    dlBtn.title = '下載';
    dlBtn.setAttribute('data-index', idx);
    dlBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      downloadSlide(parseInt(this.getAttribute('data-index')));
    });
    wrapper.appendChild(dlBtn);

    var previewSlide = el.cloneNode(true);
    previewSlide.style.transform = 'scale(' + (previewW / dim.w) + ')';
    previewSlide.style.transformOrigin = 'top left';
    wrapper.appendChild(previewSlide);

    preview.appendChild(wrapper);
  });
}

function renderCover(slide, config, theme, totalPages) {
  var titleHtml = '';
  var subtitleHtml = '';
  var bodyHtml = '';
  var highlightColor = theme.accentLight;

  slide.elements.forEach(function(el) {
    if (el.type === 'h1') {
      titleHtml += '<h1>' + renderHighlight(el.text, highlightColor) + '</h1>';
    } else if (el.type === 'h2') {
      subtitleHtml += '<h2>' + renderHighlight(el.text, highlightColor) + '</h2>';
    } else if (el.type === 'p') {
      var isEnglish = /^[A-Z\s\d\-·,.!?'"]+$/.test(el.text.trim());
      if (isEnglish) {
        bodyHtml += '<div class="subtitle">' + el.text + '</div>';
      } else {
        subtitleHtml += '<h2>' + renderHighlight(el.text, highlightColor) + '</h2>';
      }
    }
  });

  var tagHtml = config.tag ? '<div class="tag" style="background:' + theme.accent + '">' + config.tag + '</div>' : '';
  var sourceText = config.source ? 'Source | ' + config.source : '';

  var swipeHint = totalPages > 1
    ? '<div style="position:absolute;bottom:140px;right:72px;display:flex;align-items:center;gap:8px;opacity:0.5;font-size:20px">' +
        '<span>滑動看更多</span>' +
        '<span style="font-size:28px">→</span>' +
      '</div>'
    : '';

  return tagHtml +
    '<div class="cover-content">' +
      titleHtml + subtitleHtml + bodyHtml +
    '</div>' +
    swipeHint +
    '<div class="cover-footer">' +
      '<span>' + sourceText + '</span>' +
      '<span>' + config.handle + '</span>' +
    '</div>';
}

function renderContent(slide, config, pageNum, totalPages, theme, colors, textAccent) {
  // Check if first element is a hero image
  var heroUrl = null;
  var heroAlt = '';
  if (slide.elements.length > 0 && slide.elements[0].type === 'image') {
    heroUrl = slide.elements[0].url;
    heroAlt = slide.elements[0].alt || '';
    slide.elements = slide.elements.slice(1);
  }

  var tagHtml = slide.tag
    ? '<div class="tag" style="background:' + theme.accent + '">' + slide.tag + '</div>'
    : '<div></div>';
  var pageStr = String(pageNum).padStart(2, '0') + '/' + String(totalPages).padStart(2, '0');
  var highlightColor = textAccent;

  var bodyHtml = '';
  var quoteHtml = '';

  // Track consecutive numbered items to merge into cards
  var numberedQueue = [];

  function flushNumbered() {
    if (numberedQueue.length === 0) return '';
    var html = '';
    numberedQueue.forEach(function(item) {
      html += '<div class="numbered-card" style="background:' + colors.calloutBg + '">' +
        '<div class="num-badge" style="color:' + textAccent + '">' + item.num + '</div>' +
        '<div class="num-title" style="color:' + colors.heading + '">' + renderHighlight(item.title, highlightColor) + '</div>' +
        (item.desc ? '<div class="num-desc" style="color:' + colors.subtext + '">' + renderHighlight(item.desc, highlightColor) + '</div>' : '') +
      '</div>';
    });
    numberedQueue = [];
    return html;
  }

  slide.elements.forEach(function(el, elIdx) {
    // If we have queued numbered items and this isn't a plain paragraph (potential desc), flush
    if (numberedQueue.length > 0 && el.type !== 'p') {
      bodyHtml += flushNumbered();
    }

    switch (el.type) {
      case 'bignumber':
        bodyHtml += '<div class="big-number" style="color:' + textAccent + '">' + el.text + '</div>';
        break;
      case 'h1':
        bodyHtml += '<h1 style="color:' + colors.heading + '">' + renderHighlight(el.text, highlightColor) + '</h1>';
        break;
      case 'h2':
        bodyHtml += '<h2 style="color:' + colors.heading + '">' + renderHighlight(el.text, highlightColor) + '</h2>';
        break;
      case 'h3':
        bodyHtml += '<h3 style="color:' + colors.heading + '">' + renderHighlight(el.text, highlightColor) + '</h3>';
        break;
      case 'p':
        if (/^[①②③④⑤⑥⑦⑧⑨⑩]/.test(el.text)) {
          // Parse: ① **Title** or ① Title
          var num = el.text.charAt(0);
          var rest = el.text.slice(1).trim();
          // Extract bold title if present
          var boldMatch = rest.match(/^\*\*(.+?)\*\*(.*)/);
          if (boldMatch) {
            numberedQueue.push({ num: num, title: boldMatch[1], desc: boldMatch[2].trim() || '' });
          } else {
            numberedQueue.push({ num: num, title: rest, desc: '' });
          }
          // Check if next element is a plain p (description for this numbered item)
          var nextEl = slide.elements[elIdx + 1];
          if (!nextEl || nextEl.type !== 'p' || /^[①②③④⑤⑥⑦⑧⑨⑩]/.test(nextEl.text)) {
            // No desc follows or next is another number, keep as is
          }
        } else if (numberedQueue.length > 0) {
          // This paragraph is a description for the last numbered item
          numberedQueue[numberedQueue.length - 1].desc = el.text;
        } else {
          bodyHtml += '<p style="color:' + colors.subtext + '">' + renderHighlight(el.text, highlightColor) + '</p>';
        }
        break;
      case 'list':
        bodyHtml += '<div class="list-group">';
        el.items.forEach(function(item) {
          bodyHtml += '<div class="list-item" style="color:' + colors.subtext + '"><span style="position:absolute;left:4px;top:18px;width:14px;height:14px;border-radius:50%;background:' + theme.accent + ';display:block"></span>' + renderHighlight(item, highlightColor) + '</div>';
        });
        bodyHtml += '</div>';
        break;
      case 'callout':
        bodyHtml += '<div class="callout" style="background:' + colors.calloutBg + ';border-left-color:' + theme.accent + ';color:' + colors.subtext + '">' +
          '<span class="callout-icon">💡</span>' +
          '<span>' + renderHighlight(el.text, highlightColor) + '</span>' +
        '</div>';
        break;
      case 'quote':
        quoteHtml = '<div class="quote-box" style="background:' + colors.quoteBg + '">' +
          '<div class="quote-mark" style="color:' + textAccent + '">"</div>' +
          '<p style="color:' + textAccent + '">' + renderHighlight(el.text, highlightColor) + '</p>' +
        '</div>';
        break;
      case 'divider':
        bodyHtml += '<hr class="slide-divider" style="background:' + colors.text + '">';
        break;
    }
  });

  // Flush any remaining numbered items
  bodyHtml += flushNumbered();

  var sourceText = config.source ? 'Source | ' + config.source : '';

  var innerHtml = '<div class="slide-head">' +
      tagHtml +
      '<span class="page-num" style="color:' + colors.muted + '">' + pageStr + '</span>' +
    '</div>' +
    '<div class="slide-body">' +
      bodyHtml + quoteHtml +
    '</div>' +
    '<div class="slide-footer" style="color:' + colors.muted + ';border-top:1px solid ' + colors.muted + '30;padding-top:20px">' +
      '<span>' + sourceText + '</span>' +
      '<span class="handle" style="color:' + textAccent + ';background:' + textAccent + '15;padding:6px 16px;border-radius:20px">' + config.handle + '</span>' +
    '</div>';

  if (heroUrl) {
    var dim = getDimensions();
    var heroH = Math.round(dim.h * 0.28);
    var bodyH = dim.h - heroH;
    return '<img class="hero-image" src="' + heroUrl + '" alt="' + heroAlt + '" style="height:' + heroH + 'px" crossorigin="anonymous">' +
      '<div class="hero-body" style="border-left-color:' + theme.accent + ';height:' + bodyH + 'px">' + innerHtml + '</div>';
  }

  return innerHtml;
}

// === CTA RENDERER ===
function renderCta(slide, config, theme) {
  var highlightColor = theme.accentLight;
  var hasCustomContent = slide.elements && slide.elements.length > 0;

  if (hasCustomContent) {
    var html = '';
    slide.elements.forEach(function(el) {
      if (el.type === 'h1') {
        html += '<h1>' + renderHighlight(el.text, highlightColor) + '</h1>';
      } else if (el.type === 'p') {
        html += '<p>' + renderHighlight(el.text, highlightColor) + '</p>';
      }
    });
    if (config.handle) {
      html += '<div class="cta-divider" style="background:' + highlightColor + '"></div>';
      html += '<div class="cta-handle" style="color:' + highlightColor + '">' + config.handle + '</div>';
    }
    return html;
  }

  // Auto-generated CTA — use lang from frontmatter
  var lang = (config.lang || 'zh').toLowerCase();

  var CTA_LANGS = {
    zh: { title: '喜歡這篇嗎？', sub: '儲存收藏 ・ 分享給朋友', follow: '追蹤看更多好內容' },
    ja: { title: 'この投稿が好き？', sub: '保存 ・ シェアしよう', follow: 'フォローしてね' },
    en: { title: 'Enjoyed this?', sub: 'Save ・ Share with a friend', follow: 'Follow for more' },
    ko: { title: '이 글이 마음에 드셨나요?', sub: '저장 ・ 친구에게 공유', follow: '팔로우하고 더 보기' }
  };
  var ctaLang = CTA_LANGS[lang] || CTA_LANGS['en'];
  var ctaTitle = ctaLang.title;
  var ctaSub = ctaLang.sub;
  var ctaFollow = ctaLang.follow;

  var html = '';
  html += '<div class="cta-icon">👆</div>';
  html += '<h1>' + ctaTitle + '</h1>';
  html += '<p>' + ctaSub + '</p>';
  if (config.handle) {
    html += '<div class="cta-divider" style="background:' + highlightColor + '"></div>';
    html += '<div class="cta-handle" style="color:' + highlightColor + '">' + config.handle + '</div>';
    html += '<p style="margin-top:16px;font-size:28px">' + ctaFollow + '</p>';
  }
  return html;
}

// === THEME/MODE SYNC ===
function applyThemeMode() {
  var theme = document.getElementById('themeSelect').value;
  var mode = document.getElementById('modeSelect').value;
  var cover = document.getElementById('coverSelect').value;
  var ratio = document.getElementById('ratioSelect').value;
  var textarea = document.getElementById('mdInput');
  var md = textarea.value;

  md = md.replace(/^(theme:\s*).+$/m, '$1' + theme);
  md = md.replace(/^(mode:\s*).+$/m, '$1' + mode);
  md = md.replace(/^(cover:\s*).+$/m, '$1' + cover);
  md = md.replace(/^(ratio:\s*).+$/m, '$1' + ratio);

  if (!/^theme:/m.test(md)) {
    md = md.replace(/\n---/, '\ntheme: ' + theme + '\n---');
  }
  if (!/^mode:/m.test(md)) {
    md = md.replace(/\n---/, '\nmode: ' + mode + '\n---');
  }
  if (!/^cover:/m.test(md)) {
    md = md.replace(/\n---/, '\ncover: ' + cover + '\n---');
  }
  if (!/^ratio:/m.test(md)) {
    md = md.replace(/\n---/, '\nratio: ' + ratio + '\n---');
  }

  textarea.value = md;
  generate();
}

function syncDropdowns(config) {
  var ts = document.getElementById('themeSelect');
  var ms = document.getElementById('modeSelect');
  var cs = document.getElementById('coverSelect');
  var rs = document.getElementById('ratioSelect');
  if (config.theme && ts) {
    for (var i = 0; i < ts.options.length; i++) {
      if (ts.options[i].value === config.theme) { ts.selectedIndex = i; break; }
    }
  }
  if (config.mode && ms) {
    ms.value = config.mode === 'dark' ? 'dark' : 'light';
  }
  if (config.cover && cs) {
    cs.value = config.cover === 'solid' ? 'solid' : 'gradient';
  }
  if (config.ratio && rs) {
    for (var i = 0; i < rs.options.length; i++) {
      if (rs.options[i].value === config.ratio) { rs.selectedIndex = i; break; }
    }
  }
}

// === GENERATE ===
function generate() {
  var md = document.getElementById('mdInput').value;
  if (!md.trim()) return;
  var parsed = parseMd(md);
  syncDropdowns(parsed.config);
  renderSlides(parsed);
}

// === DOWNLOAD ===
async function downloadSlide(index) {
  var container = document.getElementById('renderContainer');
  var slides = container.querySelectorAll('.slide');
  if (!slides[index]) return;

  var dim = getDimensions();
  var canvas = await html2canvas(slides[index], {
    width: dim.w,
    height: dim.h,
    scale: 2,
    useCORS: true,
    backgroundColor: null
  });

  var link = document.createElement('a');
  link.download = 'slide-' + String(index + 1).padStart(2, '0') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function downloadAll() {
  var container = document.getElementById('renderContainer');
  var slides = container.querySelectorAll('.slide');
  if (slides.length === 0) return;

  var loading = document.getElementById('loading');
  loading.classList.add('active');

  for (var i = 0; i < slides.length; i++) {
    await downloadSlide(i);
    await new Promise(function(r) { setTimeout(r, 300); });
  }

  loading.classList.remove('active');
}

// === FILE UPLOAD ===
document.getElementById('fileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('mdInput').value = ev.target.result;
    generate();
  };
  reader.readAsText(file);
  e.target.value = '';
});

// === LIVE PREVIEW (debounced) ===
var _liveTimer = null;
document.getElementById('mdInput').addEventListener('input', function() {
  clearTimeout(_liveTimer);
  _liveTimer = setTimeout(generate, 300);
});

// Cmd+Enter still works as instant generate
document.getElementById('mdInput').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    clearTimeout(_liveTimer);
    generate();
  }
});

// === TAB SWITCH ===
function switchTab(tab) {
  var btns = document.querySelectorAll('.tab-btn');
  var textarea = document.getElementById('mdInput');
  var guide = document.getElementById('guidePanel');
  btns.forEach(function(b) { b.classList.remove('active'); });
  if (tab === 'guide') {
    btns[1].classList.add('active');
    textarea.style.display = 'none';
    guide.style.display = 'block';
  } else {
    btns[0].classList.add('active');
    textarea.style.display = 'block';
    guide.style.display = 'none';
  }
}
